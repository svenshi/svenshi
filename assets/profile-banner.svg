<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sven Shi animated profile banner</title>
  <desc id="desc">A premium animated blue, cyan, and violet profile banner with Sven Shi centered clearly.</desc>
  <defs>
    <linearGradient id="card" x1="82" y1="30" x2="818" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.38" stop-color="#075985"/>
      <stop offset="0.68" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="border" x1="74" y1="28" x2="826" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="-120" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(238 76) rotate(90) scale(145)">
      <stop stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(706 166) rotate(90) scale(128)">
      <stop stop-color="#a78bfa" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="30" y="0" width="840" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="120" y="45" width="660" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="74" y="28" width="752" height="184" rx="42"/>
    </clipPath>
  </defs>

  <rect width="900" height="240" fill="transparent"/>
  <g filter="url(#shadow)">
    <rect x="72" y="26" width="756" height="188" rx="44" fill="url(#border)" opacity="0.72">
      <animate attributeName="opacity" values="0.46;0.9;0.46" dur="5s" repeatCount="indefinite"/>
    </rect>
    <g clip-path="url(#cardClip)">
      <rect x="74" y="28" width="752" height="184" rx="42" fill="url(#card)"/>
      <path d="M102 178C184 214 274 207 340 159C406 111 474 88 558 104C642 120 714 96 798 48V214H102V178Z" fill="#020617" opacity="0.24"/>
      <circle cx="238" cy="76" r="145" fill="url(#orbCyan)" opacity="0.68">
        <animateTransform attributeName="transform" type="translate" values="0 0;26 10;0 0;-20 -8;0 0" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="706" cy="166" r="128" fill="url(#orbViolet)" opacity="0.72">
        <animateTransform attributeName="transform" type="translate" values="0 0;-22 -12;0 0;18 9;0 0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <g opacity="0.32">
        <path d="M98 72C168 44 247 46 314 78" stroke="#e0f2fe" stroke-width="2" stroke-linecap="round" stroke-dasharray="12 16">
          <animate attributeName="stroke-dashoffset" values="0;-56" dur="5.5s" repeatCount="indefinite"/>
        </path>
        <path d="M586 54C654 28 734 35 804 74" stroke="#ede9fe" stroke-width="2" stroke-linecap="round" stroke-dasharray="14 18">
          <animate attributeName="stroke-dashoffset" values="0;64" dur="6s" repeatCount="indefinite"/>
        </path>
      </g>
      <rect x="-170" y="18" width="112" height="210" fill="url(#shine)" opacity="0.78" transform="skewX(-18)">
        <animate attributeName="x" values="-170;950" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g filter="url(#glow)">
    <text x="450" y="116" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="850" letter-spacing="1.6" fill="#ffffff">Sven Shi</text>
    <text x="450" y="116" text-anchor="middle" dominant-baseline="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="850" letter-spacing="1.6" fill="none" stroke="#bae6fd" stroke-width="1.1" stroke-opacity="0.42">Sven Shi
      <animate attributeName="stroke-opacity" values="0.22;0.7;0.22" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="450" y="160" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="3.2" fill="#dbeafe">NETWORK · DNS · ROUTER TOOLING</text>
</svg>
